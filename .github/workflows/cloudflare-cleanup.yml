name: Cleanup Preview Worker

on:
  pull_request:
    types: [closed]
  delete:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          elif [ "${{ github.event.ref_type }}" = "branch" ]; then
            BRANCH="${{ github.event.ref }}"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          SANITIZED=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-28)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Delete preview Worker
        if: steps.branch.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name storplan-${{ steps.branch.outputs.name }} --force
