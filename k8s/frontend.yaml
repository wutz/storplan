apiVersion: apps/v1
kind: Deployment
metadata:
  name: storplan-frontend
  labels:
    app: storplan
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storplan
      component: frontend
  template:
    metadata:
      labels:
        app: storplan
        component: frontend
    spec:
      containers:
      - name: frontend
        image: cr.dev1.bz1.paratera.com/library/storplan-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: storplan-frontend
  labels:
    app: storplan
    component: frontend
spec:
  selector:
    app: storplan
    component: frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: LoadBalancer
