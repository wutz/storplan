apiVersion: apps/v1
kind: Deployment
metadata:
  name: storplan-backend
  labels:
    app: storplan
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storplan
      component: backend
  template:
    metadata:
      labels:
        app: storplan
        component: backend
    spec:
      containers:
      - name: backend
        image: cr.dev1.bz1.paratera.com/library/storplan-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: storplan-backend
  labels:
    app: storplan
    component: backend
spec:
  selector:
    app: storplan
    component: backend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
