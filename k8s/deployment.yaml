apiVersion: v1
kind: Namespace
metadata:
  name: storplan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storplan
  namespace: storplan
  labels:
    app: storplan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storplan
  template:
    metadata:
      labels:
        app: storplan
    spec:
      containers:
      - name: storplan
        image: ghcr.io/wutz/storplan:sha-dfe4047
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: storplan
  namespace: storplan
  labels:
    app: storplan
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: storplan
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storplan
  namespace: storplan
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: storplan.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: storplan
            port:
              name: http
